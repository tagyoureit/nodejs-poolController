name: Fork-publish (mirror upstream → GHCR)

# Tag-mirror leg of a HEAD-tracked Model B fork: byte-identical imagetools copy
# of upstream's GHCR images for explicit version pins. Distinct from the
# build-from-source.yml workflow that produces :latest from intarweb-dev (master
# + carried open PRs) — this workflow only handles version-tagged mirrors that
# operators may want to pin against directly.
#
# Promoted to HEAD-tracked 2026-06-06 to carry two patches:
#   1. EquipmentStateMessage IntelliCenter-v3 detection re-narrow (fb67a2d0 regression)
#   2. IntelliChem standalone-listen mode allowed on EasyTouch + IntelliCenter
# Both filed upstream as PRs; once merged the patches drop and this fork can
# return to mirror-only.
#
# DO NOT add :latest, :master, or 9.1.x to TAGS here — :latest is owned by the
# build-from-source workflow and reflects intarweb-dev's content, not upstream
# master directly. 9.1.x had the EasyTouch regression and shouldn't be exposed
# to operators as a one-line pin.

on:
  schedule:
    - cron: '1 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  UPSTREAM_IMAGE: ghcr.io/tagyoureit/njspc
  TARGET_IMAGE_NAME: njspc
  # Pre-regression anchors only. Add a new X.Y.Z here when upstream cuts a
  # release that fixes #IntelliCenter-parser AND we've validated it.
  TAGS: "9.0.0 9.0 8.4.1 8.4 8"

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: 🔑 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🪞 Mirror tags to GHCR
        run: |
          set -uo pipefail
          TARGET="ghcr.io/${{ github.repository_owner }}/${TARGET_IMAGE_NAME}"
          fail=0
          for tag in ${TAGS}; do
            echo "::group::Mirror ${UPSTREAM_IMAGE}:$tag → $TARGET:$tag"
            if docker buildx imagetools inspect "${UPSTREAM_IMAGE}:$tag" >/dev/null 2>&1; then
              if docker buildx imagetools create --tag "$TARGET:$tag" "${UPSTREAM_IMAGE}:$tag"; then
                echo "  ✓ mirrored $tag"
              else echo "::error::failed to mirror $tag"; fail=1; fi
            else echo "  - upstream tag $tag does not exist, skipping"; fi
            echo "::endgroup::"
          done
          exit $fail
